<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чат с администрацией — UHome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>

    <!-- Шапка -->
    <header class="chat-header">
        <a href="glav.html" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </a>
        <h1 class="chat-title">Администрация</h1>
        <div class="header-logo">
            <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
                <path d="M4 16L16 4L28 16V28H20V20H12V28H4V16Z" fill="#F47920"/>
                <path d="M12 20H20V28H12V20Z" fill="#333"/>
            </svg>
            <span>UHome</span>
        </div>
    </header>

    <!-- Область сообщений -->
    <main class="chat-area" id="chatArea">
        <div class="messages-container" id="messagesContainer">
            <!-- Сообщения будут добавлены через JS -->
        </div>
    </main>
        <!-- Поле ввода -->
    <footer class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="Сообщение" maxlength="500">
        <label class="attach-btn" id="attachBtn" title="Прикрепить файл">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
            <input type="file" class="file-input" id="fileInput" multiple accept="image/*,video/*">
        </label>

        <button class="send-btn" id="sendBtn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
    </footer>

    <!-- Превью загруженных файлов -->
    <div class="file-preview" id="filePreview" style="display: none;">
        <div class="preview-container" id="previewContainer"></div>
        <button class="clear-preview" id="clearPreview">&times;</button>
    </div>
    <!-- Боковое меню -->
    <div class="side-menu" id="sideMenu">
        <div class="side-menu-overlay" id="sideMenuOverlay"></div>
        <div class="side-menu-content">
            <div class="menu-header">
                <div class="menu-logo">
                    <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
                        <path d="M4 16L16 4L28 16V28H20V20H12V28H4V16Z" fill="#F47920"/>
                        <path d="M12 20H20V28H12V20Z" fill="#333"/>
                    </svg>
                    <span>UHome</span>
                </div>
                <button class="menu-close" id="menuClose">&times;</button>
            </div>
            <div class="user-profile" id="userProfileBlock">
                <img src="" alt="Аватар" class="user-avatar" id="menuAvatar">
                <div class="user-details">
                    <div class="user-name" id="menuUserName">...</div>
                    <div class="user-role" id="menuUserRole">...</div>
                </div>
            </div>
            <nav class="menu-nav" id="menuNav"></nav>
            <div class="menu-footer">
                <a href="sign_up.html" class="logout-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    <span>Выйти</span>
                </a>
            </div>
        </div>
    </div>

    <script src="js/chat.js"></script>
</body>
</html>
