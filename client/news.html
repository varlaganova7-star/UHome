<!DOCTYPE html>
<html lang="ru">

<head>
    <!-- PWA Манифест -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#F47920">

    <!-- Для iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="UHome">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- Запрет зума на мобильных -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">

    <title>Объявления и новости — UHome</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Стили страницы -->
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/news.css">
</head>

<body>
    <!-- MENU + HEADER -->
    <div id="layout-container"></div>

    <!-- Основной контент -->
    <main class="page-content">

        <!-- Заголовок -->
        <div class="title-block">

            <h1 class="page-title">

                <svg
                    width="28"
                    height="28"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <rect x="3" y="4" width="18" height="16" rx="2"/>

                    <line x1="7" y1="8" x2="17" y2="8"/>

                    <line x1="7" y1="12" x2="17" y2="12"/>

                    <line x1="7" y1="16" x2="13" y2="16"/>
                </svg>

                Объявления и новости

            </h1>

            <p class="page-subtitle">
                Важная информация и события общежития
            </p>

        </div>

        <!-- КНОПКИ ДЛЯ АДМИНА/СТУДСОВЕТА -->
        <div class="admin-controls" id="adminControls" style="display: none;">
            <button class="btn-tab" id="publishTabBtn">Опубликовать</button>
            <button class="btn-tab active" id="viewTabBtn">Смотреть</button>
        </div>

        <!-- СЕКЦИЯ ПРОСМОТРА -->
        <div id="viewSection">

            <div class="filter-container">
                <select class="category-select" id="categoryFilter">
                    <option value="" selected>Все</option>
                    <option value="important">Важное объявление</option>
                    <option value="event">Событие</option>
                    <option value="announcement">Объявление</option>
                    <option value="sanitary">Санитарные нормы</option>
                </select>
            </div>

            <div class="news-list" id="newsList">
                <!-- Объявления будут добавлены через JS -->
            </div>

        </div>

        <!-- СЕКЦИЯ ПУБЛИКАЦИИ -->
        <div class="publish-section" id="publishSection" style="display: none;">

            <div class="publish-card">

                <select class="form-select" id="publishCategory">
                    <option value="">Выбрать категорию</option>
                    <option value="important">Важное объявление</option>
                    <option value="event">Событие</option>
                    <option value="announcement">Объявление</option>
                    <option value="sanitary">Санитарные нормы</option>
                </select>

                <input type="text"
                       class="form-input"
                       id="publishTitle"
                       placeholder="Добавить заголовок">

                <textarea class="form-textarea"
                          id="publishDescription"
                          placeholder="Добавить описание"
                          rows="4"></textarea>

                <div class="upload-section">

                    <label class="upload-label">
                        Прикрепить фотографию (не обязательно)
                    </label>

                    <div class="upload-area" id="uploadArea">

                        <svg width="24"
                             height="24"
                             viewBox="0 0 24 24"
                             fill="none"
                             stroke="#F47920"
                             stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="17 8 12 3 7 8" />
                            <line x1="12" y1="3" x2="12" y2="15" />
                        </svg>

                        <span class="upload-text">
                            Нажмите для загрузки фото (<span id="photoCount">0</span>/5)
                        </span>

                        <input type="file"
                               class="upload-input"
                               id="photoInput"
                               multiple
                               accept="image/*">
                    </div>

                    <div class="uploaded-photos" id="uploadedPhotos"></div>

                </div>

                <button class="btn-publish" id="publishBtn">
                    Опубликовать
                </button>

            </div>

        </div>

    </main>

    <!-- Скрипты -->
    <script src="js/layout.js"></script>
    <script src="js/news.js"></script>

</body>

</html>
