    <title>Правила проживания — UHome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<body>

    <header class="header">

        <a href="glav.html" class="header-logo">

                <polyline points="20 6 9 17 4 12" />

        </div>

    </main>
    <div class="side-menu" id="sideMenu">

        <aside class="side-menu-content">

            <!-- TOP -->

            <div class="menu-top">

                <button class="menu-close" id="menuClose">

            </div>

                <img src="" alt="avatar" class="user-avatar" id="menuAvatar">

                <div class="user-info">

                    <div class="user-name" id="menuUserName">
                        ...
                    </div>

                    <div class="user-role" id="menuUserRole">

            <nav class="menu-nav" id="menuNav"></nav>

            <!-- FOOTER -->

            <div class="menu-footer">

                <a href="sign_up.html" class="logout-btn">

                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />

                    <span>Выйти</span>
