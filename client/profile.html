<!DOCTYPE html>
<html lang="ru">

<head>
    <!-- PWA Манифест -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#F47920">

    <!-- Для iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="UHome">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- Запрет зума на мобильных -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Профиль — UHome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>

    <header class="header">

        <a href="glav.html" class="header-logo">
            <img src="image 10.png" alt="UHome">
        </a>

        <button class="menu-btn" id="menuBtn">

            <span></span>
            <span></span>
            <span></span>

        </button>

    </header>

    <!-- Основной контент -->
    <main class="page-content">

        <!-- Заголовок -->
        <h1 class="page-title">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </svg>
            Профиль
        </h1>

        <!-- Карточка профиля -->
        <div class="profile-card">
            <img src="" alt="Аватар" class="profile-avatar" id="profileAvatar">
            <h2 class="profile-name" id="profileName">Загрузка...</h2>
            <p class="profile-role" id="profileRole">...</p>
            <button class="btn-edit" id="editBtn">Редактировать профиль</button>
        </div>

        <!-- Карточка данных -->
        <div class="data-card">

            <!-- Телефон -->
            <div class="form-field">
                <label class="field-label">Номер телефона</label>
                <input type="tel" class="field-input" id="phoneInput" placeholder="+7 (___) ___-__-__"
                    value="+7 954 390-21-44">
            </div>

            <!-- Email -->
            <div class="form-field">
                <label class="field-label">Адрес электронной почты</label>
                <input type="email" class="field-input" id="emailInput" placeholder="example@mail.ru">
            </div>

            <!-- Поля ТОЛЬКО для студента -->
            <div id="studentFields" style="display: none;">
                <div class="form-field">
                    <label class="field-label">Номер комнаты</label>
                    <input type="text" class="field-input" id="roomInput" placeholder="333">
                </div>

                <div class="form-field">
                    <label class="field-label">Этаж</label>
                    <input type="text" class="field-input" id="floorInput" placeholder="3">
                </div>

                <div class="form-field">
                    <label class="field-label">Сосед</label>
                    <input type="text" class="field-input" id="neighborInput" placeholder="Нет" readonly>
                </div>
            </div>

        </div>

        <!-- Кнопка сохранения (скрыта по умолчанию) -->
        <button class="btn-save" id="saveBtn" style="display: none;">Сохранить изменения</button>
    </main>

    <div class="side-menu" id="sideMenu">

        <div class="side-menu-overlay" id="sideMenuOverlay"></div>

        <aside class="side-menu-content">

            <!-- TOP -->

            <div class="menu-top">

                <button class="menu-close" id="menuClose">
                    ✕
                </button>

            </div>

            <!-- PROFILE -->

            <div class="user-profile" id="userProfileBlock">

                <img src="" alt="avatar" class="user-avatar" id="menuAvatar">

                <div class="user-info">

                    <div class="user-name" id="menuUserName">
                        ...
                    </div>

                    <div class="user-role" id="menuUserRole">
                        ...
                    </div>

                </div>

            </div>

            <!-- NAV -->

            <nav class="menu-nav" id="menuNav"></nav>

            <!-- FOOTER -->

            <div class="menu-footer">

                <a href="sign_up.html" class="logout-btn">

                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>

                    <span>Выйти</span>

                </a>

            </div>

        </aside>

    </div>


    <script src="js/profile.js"></script>
</body>

</html>
