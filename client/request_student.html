<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Заявка</title>
  <link rel="stylesheet" href="css/request_student.css"/>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <img src="image 10 (1).png" class="logo-img" />
    </div>
    <img src="Group 22.png" class="menu-img" />
  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="back">← Назад</div>

    <h1>🔧 Подача заявки на ремонт</h1>
    <p class="subtitle">Опишите проблему, и мы направим мастера</p>

    <div class="card">

      <!-- CATEGORY -->
      <div class="field">
        <label>Категория проблемы</label>
        <select class="select-real">
          <option disabled selected>Выберите категорию проблемы</option>
          <option>Сантехника</option>
          <option>Электрика</option>
          <option>Мебель</option>
        </select>
      </div>

      <!-- SHORT -->
      <div class="field">
        <label>Краткое описание проблемы</label>
        <input type="text" class="short-desc" placeholder="Например, протекает кран в ванной"/>
      </div>

      <!-- FULL -->
      <div class="field">
        <label>Полное описание (не обязательно)</label>
        <textarea class="full-desc" placeholder="Опишите дополнительную информацию ..."></textarea>
      </div>

      <!-- PHOTO -->
      <div class="field">
        <label>Фотографии проблемы (не обязательно)</label>

        <input type="file" id="photos" multiple accept="image/*" hidden>

        <div class="upload" id="uploadBox">
          <span>⬆</span>
          Нажмите для загрузки фото (0/5)
        </div>

        <div id="preview"></div>
      </div>

      <!-- DATE -->
      <div class="field">
        <label>Когда вы будете дома?</label>
        <p class="hint">Укажите удобное для вас время</p>

        <!-- ВАЖНО: контейнер -->
        <div id="datetime-container">

          <!-- ОДИН БЛОК -->
          <div class="datetime">
            <input type="date" class="date"/>

            <div class="time-group">
              <span>С</span>
              <input type="time" class="time-from"/>
            </div>

            <div class="time-group">
              <span>До</span>
              <input type="time" class="time-to"/>
            </div>
          </div>

        </div>

        <!-- КНОПКА ДОБАВЛЕНИЯ -->
        <div class="add-time">+ Добавить время</div>

      </div>

      <!-- PRIORITY -->
      <div class="field">
        <label>Срочность</label>

        <div class="priority">
          <span class="dot green"></span> Низкая
        </div>

        <div class="priority">
          <span class="dot yellow"></span> Средняя
        </div>

        <div class="priority">
          <span class="dot red"></span> Высокая
        </div>
      </div>

      <!-- BUTTONS -->
      <button class="btn cancel">Отмена</button>
      <button class="btn submit">Отправить заявку</button>

    </div>

  </div>
</div>

<script src="js/request_student.js"></script>

</body>
</html>
