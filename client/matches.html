<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Совпадения — UHome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/neighbor.css">
</head>
<body>

    <header class="header">
        <a href="glav.html" class="header-logo">
            <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
                <path d="M4 16L16 4L28 16V28H20V20H12V28H4V16Z" fill="#F47920"/>
                <path d="M12 20H20V28H12V20Z" fill="#333"/>
            </svg>
            <span class="logo-text">UHome</span>
        </a>
        <button class="menu-btn" id="menuBtn" aria-label="Меню">
            <span></span><span></span><span></span>
        </button>
    </header>

    <main class="page-content">
        <div class="page-header">
            <h1 class="page-title">
                <svg class="title-icon" width="28" height="28" viewBox="0 0 24 24" fill="#333">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                Подбор соседей
            </h1>
            <p class="page-subtitle">Найдите совместимого соседа</p>
        </div>

        <!-- Поиск -->
        <div class="search-bar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input type="text" placeholder="Поиск" class="search-input" id="matchSearch">
        </div>

        <!-- Список совпадений -->
        <h2 class="section-heading">Совпадения</h2>

        <div class="matches-list" id="matchesList">
            <!-- Карточка 1 -->
            <div class="match-card" data-name="владислав попов">
                <div class="match-header">
                    <span class="match-name">Владислав Попов</span>
                    <span class="match-percent">100%</span>
                </div>
                <div class="match-actions">
                    <button class="btn-view">Посмотреть анкету</button>
                    <button class="btn-select">Выбрать</button>
                </div>
            </div>

            <!-- Карточка 2 -->
            <div class="match-card" data-name="константин красков">
                <div class="match-header">
                    <span class="match-name">Константин Красков</span>
                    <span class="match-percent">90%</span>
                </div>
                <div class="match-actions">
                    <button class="btn-view">Посмотреть анкету</button>
                    <button class="btn-select">Выбрать</button>
                </div>
            </div>

            <!-- Карточка 3 -->
            <div class="match-card" data-name="николай комаров">
                <div class="match-header">
                    <span class="match-name">Николай Комаров</span>
                    <span class="match-percent">90%</span>
                </div>
                <div class="match-actions">
                    <button class="btn-view">Посмотреть анкету</button>
                    <button class="btn-select">Выбрать</button>
                </div>
            </div>

            <!-- Карточка 4 -->
            <div class="match-card" data-name="фёдор рыбаков">
                <div class="match-header">
                    <span class="match-name">Фёдор Рыбаков</span>
                    <span class="match-percent">90%</span>
                </div>
                <div class="match-actions">
                    <button class="btn-view">Посмотреть анкету</button>
                    <button class="btn-select">Выбрать</button>
                </div>
            </div>

            <!-- Карточка 5 -->
            <div class="match-card" data-name="петр петров">
                <div class="match-header">
                    <span class="match-name">Петр Петров</span>
                    <span class="match-percent">90%</span>
                </div>
                <div class="match-actions">
                    <button class="btn-view">Посмотреть анкету</button>
                    <button class="btn-select">Выбрать</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Боковое меню -->
    <div class="side-menu" id="sideMenu">
        <div class="side-menu-overlay" id="sideMenuOverlay"></div>
        <div class="side-menu-content">
            <div class="menu-header">
                <div class="menu-logo">
                    <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
                        <path d="M4 16L16 4L28 16V28H20V20H12V28H4V16Z" fill="#F47920"/>
                        <path d="M12 20H20V28H12V20Z" fill="#333"/>
                    </svg>
                    <span>UHome</span>
                </div>
                <button class="menu-close" id="menuClose">&times;</button>
            </div>
            <div class="user-profile">
                <img src="https://i.pravatar.cc/150?img=12" alt="Аватар" class="user-avatar">
                <div class="user-details">
                    <div class="user-name">Игорь Иванов</div>
                    <div class="user-role">Студент</div>
                </div>
            </div>
            <nav class="menu-nav">
                <a href="glav.html" class="menu-nav-link">
                    <svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 12h3v8h6v-6h2v6h6v-8h3L12 2z"/></svg>
                    <span>Главная</span>
                </a>
                <a href="neighbor.html" class="menu-nav-link active">
                    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    <span>Подбор соседа</span>
                </a>
            </nav>
            <div class="menu-footer">
                <a href="glav.html" class="logout-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    <span>Выйти</span>
                </a>
            </div>
        </div>
    </div>

    <script src="js/neighbor.js"></script>
</body>
</html>
