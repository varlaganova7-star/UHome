<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Профиль</title>

    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/profile.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >
</head>
<body>

    <!-- HEADER + MENU -->
    <div id="layout-container"></div>

    <!-- PAGE -->

    <main class="profile-page">

        <div class="profile-card">

            <div class="profile-header">

                <div class="avatar-wrapper">

                    <img
                        id="profileAvatar"
                        class="profile-avatar"
                        src=""
                        alt="avatar"
                    >

                    <label
                        for="avatarInput"
                        class="avatar-edit"
                    >
                        Изменить фото
                    </label>

                    <input
                        type="file"
                        id="avatarInput"
                        accept="image/*"
                    >

                </div>

                <div class="title-block">

                    <h1 class="page-title">

                        <svg width="34" height="34"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2">

                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>

                            <circle cx="12" cy="7" r="4"/>

                        </svg>

                        Мой профиль

                    </h1>

                    <p class="page-subtitle">
                        Управление личной информацией
                    </p>

                </div>

            </div>

            <form id="profileForm">

                <div class="form-grid">

                    <div class="form-group">

                        <label>ФИО</label>

                        <input
                            type="text"
                            id="fullName"
                            readonly
                        >

                    </div>

                    <div class="form-group">

                        <label>Email</label>

                        <input
                            type="email"
                            id="email"
                            readonly
                        >

                    </div>

                    <div class="form-group">

                        <label>Телефон</label>

                        <input
                            type="tel"
                            id="phone"
                            placeholder="+7 (999) 999-99-99"
                        >

                    </div>

                    <div class="form-group">

                        <label>Номер комнаты</label>

                        <input
                            type="text"
                            id="room"
                            placeholder="Например 312"
                        >

                    </div>

                    <div class="form-group">

                        <label>Факультет</label>

                        <input
                            type="text"
                            id="faculty"
                            placeholder="Укажите факультет"
                        >

                    </div>

                    <div class="form-group">

                        <label>Группа</label>

                        <input
                            type="text"
                            id="group"
                            placeholder="Например ИС-21"
                        >

                    </div>

                </div>

                <div class="form-group full-width">

                    <label>О себе</label>

                    <textarea
                        id="about"
                        rows="4"
                        placeholder="Дополнительная информация..."
                    ></textarea>

                </div>

                <button
                    type="submit"
                    class="save-btn"
                >
                    Сохранить изменения
                </button>

            </form>

        </div>

    </main>

    <script src="js/layout.js"></script>
    <script src="js/profile.js"></script>

</body>
</html>
