<!DOCTYPE html>
<html lang="ru">

<head>
  <!-- PWA Манифест -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F47920">

  <!-- Для iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="UHome">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Запрет зума на мобильных -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Заявки мастера</title>

  <link rel="stylesheet" href="css/master_requests.css" />
</head>

<body>

  <div class="app">

    <!-- HEADER -->
    <div class="header">

      <div class="logo">
        <img src="image 10 (1).png" class="logo-img" />
      </div>

      <img src="Group 22.png" class="menu-img" />

    </div>

    <!-- CONTENT -->
    <div class="content">

      <div class="back">← Назад</div>

      <h1>📝 Все заявки</h1>
      <p class="subtitle">Управление заявками на ремонт</p>

      <!-- FILTERS -->
      <div class="tabs">

        <div class="tab active" data-filter="all">
          Все
        </div>

        <div class="tab" data-filter="Ожидают">
          Ожидают
        </div>

        <div class="tab" data-filter="Выполнено">
          Выполнены
        </div>

      </div>

      <!-- REQUESTS -->
      <div id="requests-container"></div>

    </div>

  </div>

  <!-- FULLSCREEN IMAGE -->
  <div class="image-modal" id="imageModal">

    <span class="close-modal" id="closeModal">✕</span>

    <img id="modalImage" />

  </div>

  <script src="js/master_requests.js"></script>

</body>

</html>
