<!-- student-requests.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    >

    <title>Мои заявки — UHome</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="css/student_requests.css">
</head>
<body>

<!-- =========================================
HEADER
========================================= -->

<header class="header">

    <div class="header-logo">
        <img src="image 10.png" alt="logo" class="logo-icon">
    </div>

    <button class="menu-btn" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
    </button>

</header>

<!-- =========================================
CONTENT
========================================= -->

<main class="page-content">

    <a href="glav.html" class="back-btn">
        ← Назад
    </a>

    <div class="title-block">

        <h1 class="page-title">

            <svg
                width="28"
                height="28"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#222"
                stroke-width="2"
            >
                <path d="M9 11l3 3L22 4"/>
                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>

            Мои заявки

        </h1>

        <p class="page-subtitle">
            Здесь отображаются все ваши заявки и их текущий статус
        </p>

    </div>

    <!-- АКТИВНЫЕ -->

    <div class="section-title">
        Активные заявки
    </div>

    <div id="activeRequests"></div>

    <!-- ИСТОРИЯ -->

    <div class="section-title history-title">
        История заявок
    </div>

    <div id="historyRequests"></div>

</main>

<!-- =========================================
MENU
========================================= -->

<div class="side-menu" id="sideMenu">

    <div class="side-menu-overlay" id="sideMenuOverlay"></div>

    <div class="side-menu-content">

        <div class="menu-header">

            <div class="menu-logo">
                <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
                    <path
                        d="M4 16L16 4L28 16V28H20V20H12V28H4V16Z"
                        fill="#F47920"
                    />
                    <path
                        d="M12 20H20V28H12V20Z"
                        fill="#333"
                    />
                </svg>

                <span>UHome</span>
            </div>

            <button class="menu-close" id="menuClose">
                &times;
            </button>

        </div>

        <!-- PROFILE -->

        <div class="user-profile" id="userProfileBlock">

            <img
                src=""
                alt="avatar"
                class="user-avatar"
                id="menuAvatar"
            >

            <div class="user-details">

                <div class="user-name" id="menuUserName">
                    ...
                </div>

                <div class="user-role" id="menuUserRole">
                    ...
                </div>

            </div>

        </div>

        <!-- NAV -->

        <nav class="menu-nav" id="menuNav"></nav>

        <!-- FOOTER -->

        <div class="menu-footer">

            <a href="sign_up.html" class="logout-link">

                <svg
                    width="20"
                    height="20"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                >
                    <path
                        d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"
                    />
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>

                <span>Выйти</span>

            </a>

        </div>

    </div>

</div>

<script src="js/student_requests.js"></script>

</body>
</html>
