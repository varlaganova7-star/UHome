<!DOCTYPE html>
<html lang="ru">

<head>
    <!-- PWA Манифест -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#F47920">

    <!-- Для iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="UHome">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- Запрет зума на мобильных -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Подбор соседей — UHome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/neighbor.css">
</head>

<body>

    <!-- Шапка -->
    <header class="header">
        <div class="header-logo">
            <img src="image 10.png" alt="UHome Logo" class="logo-icon">

        </div>
        <button class="menu-btn" id="menuBtn" aria-label="Открыть меню">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <!-- Контент -->
    <main class="page-content">
        <div class="page-header">
            <h1 class="page-title">
                <svg class="title-icon" width="28" height="28" viewBox="0 0 24 24" fill="#333">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
                Подбор соседей
            </h1>
            <p class="page-subtitle">Найдите совместимого соседа</p>
        </div>

        <div class="action-buttons">
            <a href="questionnaire.html" class="btn-primary">Заполнить анкету</a>
            <a href="matches.html" class="btn-secondary">Посмотреть совпадения</a>
        </div>
    </main>

    <!-- Боковое меню (общее) -->
    <div class="side-menu" id="sideMenu">
        <div class="side-menu-overlay" id="sideMenuOverlay"></div>
        <div class="side-menu-content">
            <div class="menu-header">
                <div class="menu-logo">
                    <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
                        <path d="M4 16L16 4L28 16V28H20V20H12V28H4V16Z" fill="#F47920" />
                        <path d="M12 20H20V28H12V20Z" fill="#333" />
                    </svg>
                    <span>UHome</span>
                </div>
                <button class="menu-close" id="menuClose">&times;</button>
            </div>
            <div class="user-profile">
                <img src="https://i.pravatar.cc/150?img=12" alt="Аватар" class="user-avatar">
                <div class="user-details">
                    <div class="user-name">Игорь Иванов</div>
                    <div class="user-role">Студент</div>
                </div>
            </div>
            <nav class="menu-nav" id="menuNav">
                <!-- ⚠️ Здесь НЕ должно быть никаких <a href="..."> -->
                <!-- JavaScript сам заполнит этот блок -->
            </nav>
            <div class="menu-footer">
                <a href="glav.html" class="logout-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    <span>Выйти</span>
                </a>
            </div>
        </div>
    </div>

    <script src="js/neighbor.js"></script>
</body>

</html>
