<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Правила проживания — UHome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/rules.css">
</head>
<body>

    <header class="header">
        <div class="header-logo">
            <img src="image 10.png" alt="UHome Logo" class="logo-icon">
            
        </div>
        <button class="menu-btn" id="menuBtn" aria-label="Открыть меню">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <!-- Основной контент -->
    <main class="page-content">
        
        <!-- Заголовок -->
        <h1 class="page-title">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#28A745" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
            Правила проживания
        </h1>

        <!-- Список правил (аккордеон) -->
        <div class="rules-container" id="rulesContainer">
            <!-- Правила будут добавлены через JS -->
        </div>

    </main>

    <!-- Боковое меню -->
    <div class="side-menu" id="sideMenu">
        <div class="side-menu-overlay" id="sideMenuOverlay"></div>
        <div class="side-menu-content">
            <div class="menu-header">
                <div class="menu-logo">
                    <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
                        <path d="M4 16L16 4L28 16V28H20V20H12V28H4V16Z" fill="#F47920"/>
                        <path d="M12 20H20V28H12V20Z" fill="#333"/>
                    </svg>
                    <span>UHome</span>
                </div>
                <button class="menu-close" id="menuClose">&times;</button>
            </div>
            <div class="user-profile" id="userProfileBlock">
                <img src="" alt="Аватар" class="user-avatar" id="menuAvatar">
                <div class="user-details">
                    <div class="user-name" id="menuUserName">...</div>
                    <div class="user-role" id="menuUserRole">...</div>
                </div>
            </div>
            <nav class="menu-nav" id="menuNav"></nav>
            <div class="menu-footer">
                <a href="sign_up.html" class="logout-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    <span>Выйти</span>
                </a>
            </div>
        </div>
    </div>

    <script src="js/rules.js"></script>
</body>
</html>
