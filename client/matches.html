<!DOCTYPE html>
<html lang="ru">

<head>
    <!-- PWA Манифест -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#F47920">

    <!-- Для iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="UHome">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Совпадения — UHome</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/neighbor.css">
</head>

<body>

    <!-- Общий layout -->
    <div id="layout-container"></div>

    <main class="page-content">

        <div class="page-header">

            <h1 class="page-title">

                <svg width="28" height="28"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2">

                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>

                    <circle cx="9" cy="7" r="4"/>

                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>

                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>

                </svg>

                Подбор соседей

            </h1>

            <p class="page-subtitle">
                Найдите совместимого соседа
            </p>

        </div>

        <!-- Поиск -->

        <div class="search-bar">

            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>

            <input
                type="text"
                placeholder="Поиск"
                class="search-input"
                id="matchSearch">

        </div>

        <h2 class="section-heading">
            Совпадения
        </h2>

        <div class="matches-list" id="matchesList">

            <div class="match-card" data-name="владислав попов">
                <div class="match-header">
                    <span class="match-name">Владислав Попов</span>
                    <span class="match-percent">100%</span>
                </div>
                <div class="match-actions">
                    <button class="btn-view">Посмотреть анкету</button>
                    <button class="btn-select">Выбрать</button>
                </div>
            </div>

            <div class="match-card" data-name="константин красков">
                <div class="match-header">
                    <span class="match-name">Константин Красков</span>
                    <span class="match-percent">90%</span>
                </div>
                <div class="match-actions">
                    <button class="btn-view">Посмотреть анкету</button>
                    <button class="btn-select">Выбрать</button>
                </div>
            </div>

            <div class="match-card" data-name="николай комаров">
                <div class="match-header">
                    <span class="match-name">Николай Комаров</span>
                    <span class="match-percent">90%</span>
                </div>
                <div class="match-actions">
                    <button class="btn-view">Посмотреть анкету</button>
                    <button class="btn-select">Выбрать</button>
                </div>
            </div>

            <div class="match-card" data-name="фёдор рыбаков">
                <div class="match-header">
                    <span class="match-name">Фёдор Рыбаков</span>
                    <span class="match-percent">90%</span>
                </div>
                <div class="match-actions">
                    <button class="btn-view">Посмотреть анкету</button>
                    <button class="btn-select">Выбрать</button>
                </div>
            </div>

            <div class="match-card" data-name="петр петров">
                <div class="match-header">
                    <span class="match-name">Петр Петров</span>
                    <span class="match-percent">90%</span>
                </div>
                <div class="match-actions">
                    <button class="btn-view">Посмотреть анкету</button>
                    <button class="btn-select">Выбрать</button>
                </div>
            </div>

        </div>

    </main>

    <script src="js/layout.js"></script>
    <script src="js/neighbor.js"></script>

</body>

</html>
