<!-- repair-request.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Подача заявки на ремонт — UHome</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/repair_request.css">
</head>
<body>

    <!-- ШАПКА -->
    <header class="header">
        <div class="header-logo">
            <img src="image 10.png" alt="UHome Logo" class="logo-icon">
        </div>

        <button class="menu-btn" id="menuBtn" aria-label="Открыть меню">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main class="page-content">

        <!-- Назад -->
        <a href="glav.html" class="back-btn">
            ← Назад
        </a>

        <!-- Заголовок -->
        <div class="title-block">
            <h1 class="page-title">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="2">
                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                </svg>

                Подача заявки на ремонт
            </h1>

            <p class="page-subtitle">
                Опишите проблему, и мы направим мастера
            </p>
        </div>

        <!-- КАРТОЧКА -->
        <section class="repair-card">

            <!-- Категория -->
            <div class="form-group">
                <label class="form-label">Категория проблемы</label>

                <select class="form-select" id="problemCategory">
                    <option value="">Выберите категорию проблемы</option>
                    <option value="electric">Электрика</option>
                    <option value="plumbing">Сантехника</option>
                    <option value="furniture">Мебель</option>
                    <option value="window">Окна / двери</option>
                    <option value="other">Другое</option>
                </select>
            </div>

            <!-- Краткое описание -->
            <div class="form-group">
                <label class="form-label">Краткое описание проблемы</label>

                <input
                    type="text"
                    class="form-input"
                    id="shortDescription"
                    placeholder="Например, протекает кран в ванной"
                >
            </div>

            <!-- Полное описание -->
            <div class="form-group">
                <label class="form-label">
                    Полное описание (не обязательно)
                </label>

                <textarea
                    class="form-textarea"
                    id="fullDescription"
                    placeholder="Опишите дополнительную информацию ..."
                ></textarea>
            </div>

            <!-- Фото -->
            <div class="form-group">
                <label class="form-label">
                    Фотографии проблемы (не обязательно)
                </label>

                <div class="upload-area" id="uploadArea">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>

                    <span>
                        Нажмите для загрузки фото
                        (<span id="photoCount">0</span>/5)
                    </span>

                    <input
                        type="file"
                        id="photoInput"
                        multiple
                        accept="image/*"
                    >
                </div>

                <div class="uploaded-photos" id="uploadedPhotos"></div>
            </div>

            <!-- Когда дома -->
            <div class="form-group">
                <label class="form-label">Когда вы будете дома?</label>

                <p class="helper-text">
                    Укажите удобное для вас время, когда мастер сможет прийти
                </p>

                <div class="date-time-row">
                    <input type="date" class="form-input small-input">

                    <div class="time-range">
                        <input type="time" class="form-input small-input">
                        <span class="time-divider">—</span>
                        <input type="time" class="form-input small-input">
                    </div>
                </div>
            </div>

            <!-- Срочность -->
            <div class="form-group">
                <label class="form-label">Срочность</label>

                <div class="priority-list">

                    <label class="priority-item">
                        <input type="radio" name="priority" value="low" checked>

                        <div class="priority-content">
                            <span class="priority-dot green"></span>
                            <span>Низкая</span>
                        </div>
                    </label>

                    <label class="priority-item">
                        <input type="radio" name="priority" value="medium">

                        <div class="priority-content">
                            <span class="priority-dot yellow"></span>
                            <span>Средняя</span>
                        </div>
                    </label>

                    <label class="priority-item">
                        <input type="radio" name="priority" value="high">

                        <div class="priority-content">
                            <span class="priority-dot red"></span>
                            <span>Высокая</span>
                        </div>
                    </label>

                </div>
            </div>

            <!-- КНОПКИ -->
            <div class="button-group">
                <button class="btn-cancel">
                    Отмена
                </button>

                <button class="btn-submit" id="submitBtn">
                    Отправить заявку
                </button>
            </div>

        </section>

    </main>
    <!-- Боковое меню -->
    <div class="side-menu" id="sideMenu">
        <div class="side-menu-overlay" id="sideMenuOverlay"></div>
        <div class="side-menu-content">
            <div class="menu-header">
                <div class="menu-logo">
                    <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
                        <path d="M4 16L16 4L28 16V28H20V20H12V28H4V16Z" fill="#F47920"/>
                        <path d="M12 20H20V28H12V20Z" fill="#333"/>
                    </svg>
                    <span>UHome</span>
                </div>
                <button class="menu-close" id="menuClose">&times;</button>
            </div>

            <div class="user-profile" id="userProfileBlock">
                <img src="" alt="Аватар" class="user-avatar" id="menuAvatar">

                <div class="user-details">
                    <div class="user-name" id="menuUserName">...</div>
                    <div class="user-role" id="menuUserRole">...</div>
                </div>
            </div>

            <nav class="menu-nav" id="menuNav"></nav>

            <div class="menu-footer">
                <a href="sign_up.html" class="logout-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>

                    <span>Выйти</span>
                </a>
            </div>
        </div>
    </div>
    <script src="js/repair_request.js"></script>
</body>
</html>
