<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Все заявки — UHome</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/master_requests.css">
</head>

<body>

<!-- HEADER -->

<header class="header">

    <div class="header-logo">

        <img src="image 10.png"
             alt="UHome"
             class="logo-icon">

    </div>

    <button class="menu-btn"
            id="menuBtn">

        <span></span>
        <span></span>
        <span></span>

    </button>

</header>

<!-- CONTENT -->

<main class="page-content">

    <a href="glav.html"
       class="back-btn">

        ← Назад

    </a>

    <div class="title-block">

        <h1 class="page-title">

            <svg width="28"
                 height="28"
                 viewBox="0 0 24 24"
                 fill="none"
                 stroke="#222"
                 stroke-width="2">

                <path d="M9 11H3"/>
                <path d="M9 16H3"/>
                <path d="M13 6H3"/>
                <path d="M14 8l7-7"/>
                <path d="M18 5l3 3"/>
                <path d="M21 2l1 1"/>
                <path d="M14 8v3h3"/>
                <path d="M5 21h14a2 2 0 0 0 2-2v-7"/>
                <path d="M3 3v18"/>

            </svg>

            Все заявки

        </h1>

        <p class="page-subtitle">
            Управление заявками на ремонт
        </p>

    </div>

    <!-- FILTERS -->

    <div class="filter-tabs">

        <button class="filter-btn active"
                data-filter="all">

            Все

        </button>

        <button class="filter-btn"
                data-filter="waiting">

            Ожидают

        </button>

        <button class="filter-btn"
                data-filter="done">

            Выполнены

        </button>

    </div>

    <!-- CATEGORY -->

    <div class="sort-block">

        <select id="categoryFilter"
                class="category-select">

            <option value="all">
                Все категории
            </option>

            <option value="Электрика">
                Электрика
            </option>

            <option value="Сантехника">
                Сантехника
            </option>

            <option value="Мебель">
                Мебель
            </option>

            <option value="Окна / двери">
                Окна / двери
            </option>

            <option value="Другое">
                Другое
            </option>

        </select>

    </div>

    <!-- REQUESTS -->

    <div id="requestsContainer"></div>

</main>

<!-- SIDE MENU -->

<div class="side-menu"
     id="sideMenu">

    <div class="side-menu-overlay"
         id="sideMenuOverlay"></div>

    <div class="side-menu-content">

        <div class="menu-header">

            <div class="menu-logo">

                <svg width="24"
                     height="24"
                     viewBox="0 0 32 32"
                     fill="none">

                    <path d="M4 16L16 4L28 16V28H20V20H12V28H4V16Z"
                          fill="#F47920"/>

                    <path d="M12 20H20V28H12V20Z"
                          fill="#333"/>

                </svg>

                <span>UHome</span>

            </div>

            <button class="menu-close"
                    id="menuClose">

                &times;

            </button>

        </div>

        <div class="user-profile">

            <img src="https://ui-avatars.com/api/?name=Павел+Краскин&background=F47920&color=fff&size=300"
                 class="user-avatar"
                 alt="avatar">

            <div class="user-details">

                <div class="user-name">
                    Павел Краскин
                </div>

                <div class="user-role">
                    Электрик
                </div>

            </div>

        </div>

        <nav class="menu-nav">

            <a href="glav.html"
               class="menu-nav-link">

                🏠 Главная

            </a>

            <a href="master-requests.html"
               class="menu-nav-link active">

                🔧 Просмотр заявок

            </a>

            <a href="chat.html"
               class="menu-nav-link">

                💬 Чат с администрацией

            </a>

        </nav>

        <div class="menu-footer">

            <a href="sign_up.html"
               class="logout-link">

                Выйти

            </a>

        </div>

    </div>

</div>

<script src="js/master_requests.js"></script>

</body>
</html>
